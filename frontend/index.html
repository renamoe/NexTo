<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地图日程提醒</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- 高德地图 JS API 2.0 Loader -->
  <script src="https://webapi.amap.com/loader.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark navbar-expand-lg bg-primary py-2 shadow-sm">
  <div class="container-fluid px-3">
    <span class="navbar-brand fw-bold fs-5">
      <i class="bi bi-geo-alt-fill me-2"></i>地图日程提醒
    </span>
    <div class="d-flex align-items-center gap-2">
      <!-- 登录状态区域 -->
      <div id="authArea" class="me-2 text-white small">
        <span id="userNameDisplay" class="d-none me-2"></span>
        <a href="#" id="loginBtn" class="text-white text-decoration-none">登录</a>
        <a href="#" id="logoutBtn" class="d-none text-white text-decoration-none ms-2">注销</a>
      </div>
      <!-- 搜索地点 -->
      <div class="input-group input-group-sm" style="width:260px">
        <input id="searchInput" type="text" class="form-control" placeholder="搜索地点…" />
        <button class="btn btn-light btn-sm" id="searchBtn" type="button">
          <i class="bi bi-search"></i>
        </button>
      </div>
      <!-- 今日提醒数量徽标 -->
      <button class="btn btn-outline-light btn-sm position-relative" id="todayBtn" title="今日提醒">
        <i class="bi bi-bell-fill"></i>
        <span id="todayBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
      </button>
      <!-- 新增日程 -->
      <button class="btn btn-warning btn-sm" id="addScheduleBtn">
        <i class="bi bi-plus-lg me-1"></i>新增日程
      </button>
    </div>
  </div>
</nav>

<!-- ===== Main layout ===== -->
<div class="app-container">

  <!-- ---- Left sidebar ---- -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between px-3 py-2">
      <span class="fw-semibold text-primary">
        <i class="bi bi-calendar3 me-1"></i>日程列表
      </span>
      <div class="d-flex gap-1">
        <!-- 过滤 -->
        <select class="form-select form-select-sm" id="filterSelect" style="width:auto">
          <option value="all">全部</option>
          <option value="today">今日</option>
          <option value="upcoming">即将到来</option>
          <option value="past">已过期</option>
        </select>
      </div>
    </div>

    <!-- 搜索日程 -->
    <div class="px-3 pb-2">
      <input type="text" class="form-control form-control-sm" id="listSearch" placeholder="搜索日程标题…" />
    </div>

    <!-- 日程列表 -->
    <div id="scheduleList" class="schedule-list px-2"></div>

    <!-- 空状态 -->
    <div id="emptyState" class="text-center text-muted py-5 d-none">
      <i class="bi bi-calendar-x display-6 d-block mb-2"></i>
      <small>暂无日程，点击地图添加</small>
    </div>
  </aside>

  <!-- ---- Map ---- -->
  <main class="map-wrapper">
    <div id="mapContainer"></div>

    <!-- 点击提示 -->
    <div id="mapHint" class="map-hint badge bg-dark bg-opacity-75 text-white">
      <i class="bi bi-cursor me-1"></i>单击地图任意位置添加日程
    </div>

    <!-- 路线信息浮层 -->
    <div id="routePanel" class="route-panel d-none">
      <div class="rp-header d-flex align-items-center justify-content-between mb-2">
        <span class="fw-semibold text-primary fs-6">
          <i class="bi bi-signpost-2-fill me-1"></i>路线规划
        </span>
        <button type="button" class="btn-close btn-close-sm" id="closeRoutePanelBtn" aria-label="关闭"></button>
      </div>
      <!-- 出行方式切换 -->
      <div class="d-flex gap-1 mb-2" id="rpModeBar">
        <button class="btn btn-sm rp-mode-btn active" data-mode="driving">
          <i class="bi bi-car-front me-1"></i>驾车
        </button>
        <button class="btn btn-sm rp-mode-btn" data-mode="walking">
          <i class="bi bi-person-walking me-1"></i>步行
        </button>
        <button class="btn btn-sm rp-mode-btn" data-mode="riding">
          <i class="bi bi-bicycle me-1"></i>骑行
        </button>
      </div>
      <!-- 路线信息内容 -->
      <div id="rpContent">
        <div class="text-center py-2 text-muted small">
          <div class="spinner-border spinner-border-sm me-1" role="status"></div>
          正在规划路线…
        </div>
      </div>
    </div>
  </main>

</div>

<!-- ===================================================
     Modal: 新增 / 编辑日程
=================================================== -->
<div class="modal fade" id="scheduleModal" tabindex="-1" aria-labelledby="scheduleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="scheduleModalLabel">
          <i class="bi bi-calendar-plus me-2"></i>新增日程
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <input type="hidden" id="editLng" />
        <input type="hidden" id="editLat" />

        <div class="mb-3">
          <label class="form-label fw-semibold">日程标题 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="scheduleTitle" placeholder="请输入日程标题" maxlength="50" />
        </div>

        <div class="mb-3" style="position:relative">
          <label class="form-label fw-semibold">搜索地点</label>
          <div class="input-group mb-1">
            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control" id="locationSearchInput"
              placeholder="输入地名、POI 搜索并选择…" autocomplete="off" />
            <button class="btn btn-outline-secondary" type="button" id="locationSearchBtn">搜索</button>
          </div>
          <!-- 搜索结果自定义下拉（在 modal 内部渲染，不受 z-index 影响）-->
          <div id="locationSuggestList" class="list-group shadow d-none"
            style="position:absolute;left:0;right:0;top:100%;z-index:9999;max-height:180px;overflow-y:auto"></div>
          <input type="text" class="form-control mt-1" id="scheduleLocation"
            placeholder="已选地点将显示在此（也可单击地图选取）" readonly />
          <div class="form-text text-muted">输入地名搜索选择，或直接单击地图选取位置</div>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold">经度</label>
            <input type="text" class="form-control" id="scheduleLng" readonly />
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">纬度</label>
            <input type="text" class="form-control" id="scheduleLat" readonly />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">日程时间 <span class="text-danger">*</span></label>
          <input type="datetime-local" class="form-control" id="scheduleTime" />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">提醒方式</label>
          <div class="d-flex gap-3 flex-wrap">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remindBrowser" checked />
              <label class="form-check-label" for="remindBrowser">浏览器通知</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remindSound" />
              <label class="form-check-label" for="remindSound">声音提醒</label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">提前提醒</label>
          <select class="form-select" id="remindBefore">
            <option value="0">准时</option>
            <option value="5">提前 5 分钟</option>
            <option value="10">提前 10 分钟</option>
            <option value="15" selected>提前 15 分钟</option>
            <option value="30">提前 30 分钟</option>
            <option value="60">提前 1 小时</option>
          </select>
        </div>

        <!-- 智能出行提醒 -->
        <div class="mb-3">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="smartRemind" />
            <label class="form-check-label fw-semibold" for="smartRemind">
              智能出行提醒
              <span class="badge bg-info text-dark ms-1" style="font-size:0.68rem">实时路况</span>
            </label>
          </div>
          <div class="form-text text-muted mb-1">开启后根据实时路况自动计算最晚出发时间并提醒</div>
          <div id="smartRemindOptions" class="d-none border rounded p-2">
            <div class="d-flex gap-3 flex-wrap mb-2">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="travelMode" id="modeDriving" value="driving" checked />
                <label class="form-check-label" for="modeDriving"><i class="bi bi-car-front me-1"></i>驾车</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="travelMode" id="modeWalking" value="walking" />
                <label class="form-check-label" for="modeWalking"><i class="bi bi-person-walking me-1"></i>步行</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="travelMode" id="modeRiding" value="riding" />
                <label class="form-check-label" for="modeRiding"><i class="bi bi-bicycle me-1"></i>骑行</label>
              </div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <button type="button" class="btn btn-sm btn-outline-info" id="queryTravelBtn">
                <i class="bi bi-clock-history me-1"></i>预估行程时间
              </button>
              <span id="travelTimeResult" class="small"></span>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">颜色标签</label>
          <div class="d-flex gap-2" id="colorPicker">
            <button type="button" class="color-dot active" data-color="#4285F4" style="background:#4285F4" title="蓝色"></button>
            <button type="button" class="color-dot" data-color="#EA4335" style="background:#EA4335" title="红色"></button>
            <button type="button" class="color-dot" data-color="#34A853" style="background:#34A853" title="绿色"></button>
            <button type="button" class="color-dot" data-color="#FBBC04" style="background:#FBBC04" title="黄色"></button>
            <button type="button" class="color-dot" data-color="#AB47BC" style="background:#AB47BC" title="紫色"></button>
            <button type="button" class="color-dot" data-color="#FF7043" style="background:#FF7043" title="橙色"></button>
          </div>
          <input type="hidden" id="scheduleColor" value="#4285F4" />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">备注</label>
          <textarea class="form-control" id="scheduleNote" rows="2" placeholder="备注信息（可选）" maxlength="200"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="saveScheduleBtn">
          <i class="bi bi-check-lg me-1"></i>保存日程
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===================================================
     Modal: 日程详情
=================================================== -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">
      <div class="modal-header text-white" id="detailModalHeader">
        <h5 class="modal-title" id="detailModalLabel">日程详情</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-danger" id="deleteScheduleBtn">
          <i class="bi bi-trash me-1"></i>删除
        </button>
        <button type="button" class="btn btn-outline-info" id="navScheduleBtn">
          <i class="bi bi-signpost-2 me-1"></i>路况
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        <button type="button" class="btn btn-primary" id="editScheduleBtn">
          <i class="bi bi-pencil me-1"></i>编辑
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===================================================
     Toast: 提醒通知
=================================================== -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<!-- ===================================================
     Modal: 今日提醒
=================================================== -->
<div class="modal fade" id="todayModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">
      <div class="modal-header bg-warning text-dark">
        <h5 class="modal-title"><i class="bi bi-bell-fill me-2"></i>今日日程</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="todayModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>

<!-- ===================================================
     Modal: 实时路况 & 行程时间
=================================================== -->
<div class="modal fade" id="navModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">
      <div class="modal-header bg-info text-white">
        <h5 class="modal-title"><i class="bi bi-signpost-2-fill me-2"></i>实时路况 &amp; 行程时间</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="navModalBody">
        <div class="text-center py-4">
          <div class="spinner-border text-info" role="status"></div>
          <div class="mt-2 text-muted">正在获取定位和路况…</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        <button type="button" class="btn btn-info text-white" id="openAmapNavBtn">
          <i class="bi bi-map me-1"></i>在高德地图导航
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===================================================
     Modal: 登录 / 注册
=================================================== -->
<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content shadow">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bi bi-person-fill me-2"></i>账号通行证</h5>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab" aria-selected="true">登录</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab" aria-selected="false">注册</button>
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="login-pane" role="tabpanel" tabindex="0">
            <input type="text" id="loginUsername" class="form-control mb-2" placeholder="用户名" />
            <input type="password" id="loginPassword" class="form-control mb-3" placeholder="密码" />
            <button id="doLoginBtn" class="btn btn-primary w-100">登录</button>
          </div>
          <div class="tab-pane fade" id="register-pane" role="tabpanel" tabindex="0">
            <input type="email" id="regEmail" class="form-control mb-2" placeholder="邮箱" />
            <input type="text" id="regUsername" class="form-control mb-2" placeholder="用户名" />
            <input type="password" id="regPassword" class="form-control mb-3" placeholder="密码" />
            <button id="doRegisterBtn" class="btn btn-success w-100">注册</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- App JS -->
<script src="js/api.js?v=2"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>

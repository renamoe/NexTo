
networks:
  nexto_net:
    driver: bridge

services:
  # 数据库：PostGIS (支持地理空间的 PostgreSQL)
  db:
    image: postgis/postgis:15-3.3
    container_name: map_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: map_schedule
    ports:
      - "5432:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d map_schedule"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexto_net

  # 缓存：Redis (用于消息推送和坐标缓存)
  redis:
    image: redis:7-alpine
    container_name: map_redis
    ports:
      - "6379:6379"
    networks:
      - nexto_net

  # 后端：FastAPI (开发模式)
  backend:
    build: ./backend
    container_name: map_backend
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db/map_schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexto_net

  # 前端：纯静态 Bootstrap + AMap，由 Nginx 托管
  frontend:
    build: ./frontend
    container_name: map_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nexto_net
